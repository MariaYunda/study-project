<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Study.IT{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0a1929; color: #fff; }
        .hero-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 80px 0; }
        .course-card { background: rgba(255,255,255,0.05); border-radius: 15px; transition: transform 0.3s; padding: 20px; }
        .course-card:hover { transform: translateY(-5px); border: 1px solid #3776AB; }
        .navbar { background: #0a1929 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'study_app:index' %}">Study.IT</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'study_app:index' %}">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'study_app:course_list' %}">Курсы</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'study_app:about' %}">О нас</a></li>
                </ul>
            </div>
        </div>
    </nav>

    {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
